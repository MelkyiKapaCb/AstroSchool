<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Школа{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<header class="site-header">
    <a class="logo" href="/">АстроШкола</a>
    <nav class="site-nav">
        <a href="/">Главная</a>
        <a href="/students">Ученики</a>
        <a href="/groups">Группы</a>
        <a href="/shop">Магазин</a>
        <a href="/cart">Корзина</a>
        {% if current_user %}
            <a href="/profile">Профиль</a>
            {% if is_admin %}
                <span class="nav-badge">админ</span>
            {% endif %}
            <form class="inline-form" action="/logout" method="post">
                <button type="submit" class="link-btn">Выйти</button>
            </form>
        {% else %}
            <a href="/login">Вход</a>
            <a href="/register" class="nav-accent">Регистрация</a>
        {% endif %}
    </nav>
</header>
<main class="site-main">
    {% block content %}{% endblock %}
</main>
<footer class="site-footer">
    <span>Учебный проект</span>
</footer>
</body>
</html>
