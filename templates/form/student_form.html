{% extends 'base.html' %}
{% block title %}Новый ученик{% endblock %}
{% block content %}
<section class="narrow">
    <h1>Добавить ученика</h1>
    <form class="stack-form" action="/students/add" method="post">
        <label>Имя
            <input type="text" name="name" placeholder="Имя" required>
        </label>
        <label>Класс / метка
            <input type="text" name="class_name" placeholder="Например 10А" required>
        </label>
        <button class="btn btn-primary" type="submit">Добавить</button>
    </form>
    <p><a href="/students">Назад к списку</a></p>
</section>
{% endblock %}
