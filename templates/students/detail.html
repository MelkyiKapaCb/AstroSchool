{% extends 'base.html' %}
{% block title %}{{ student.name }} — Ученик{% endblock %}
{% block content %}
<section class="page-header">
    <a class="back-link" href="/students">← Все ученики</a>
    <h1>{{ student.name }}</h1>
</section>
<div class="card profile-card">
    <p><strong>Монеты:</strong> {{ student.coins }}</p>
    <p><strong>Класс (поле):</strong> {{ student['class'] or '—' }}</p>
    <p class="muted small">id: {{ student.id }}</p>
</div>
{% endblock %}
