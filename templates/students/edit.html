{% extends "base.html" %}

{% block content %}
<h1>Редактирование студента</h1>

<form method="post">
    <div>
        <label>Имя:</label><br>
        <input type="text" name="name" value="{{ student.name }}" required>
    </div>
    
    <div style="margin-top: 10px;">
        <label>Класс:</label><br>
        <input type="text" name="class_name" value="{{ student['class'] }}" required>
    </div>
    
    <div style="margin-top: 10px;">
        <label>Монеты (💰):</label><br>
        <input type="number" name="coins" value="{{ student.coins }}">
    </div>
    
    <div style="margin-top: 10px;">
        <label>Data:</label><br>
        <textarea name="data" rows="3" cols="40">{{ student.data }}</textarea>
    </div>
    
    <div style="margin-top: 10px;">
        <label>Логин:</label><br>
        <input type="text" name="login" value="{{ student.login }}">
    </div>
    
    <div style="margin-top: 10px;">
        <label>Пароль:</label><br>
        <input type="text" name="password" value="{{ student.password }}">
    </div>
    
    <div style="margin-top: 20px;">
        <button type="submit">Сохранить</button>
        <a href="/students">Отмена</a>
    </div>
</form>
{% endblock %}
