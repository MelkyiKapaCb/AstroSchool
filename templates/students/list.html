{% extends "base.html" %}

{% block content %}
<h1>Список студентов</h1>
<a href="/students/add">➕ Добавить</a>

<table border="1">
    <thead>
        <tr><th>ID</th><th>Имя</th><th>Класс</th><th>Действия</th></tr>
    </thead>
    <tbody>
        {% for student in students %}
        <tr>
            <td>{{ student.id }}</td>
            <td>{{ student.name }}</td>
            <td>{{ student['class'] }}</td>
            <td>
                <a href="/student/{{ student.id }}">Профиль</a>
                <a href="/students/edit/{{ student.id }}">✏️</a>
                <button class="delete-btn" data-id="{{ student.id }}">🗑️</button>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<script>
document.querySelectorAll('.delete-btn').forEach(btn => {
    btn.onclick = async () => {
        let id = btn.dataset.id;
        if (!confirm('Удалить?')) return;
        let res = await fetch(`/students/delete/${id}`, { method: 'DELETE' });
        if (res.ok) btn.closest('tr').remove();
        else alert('Ошибка');
    };
});
</script>
{% endblock %}
