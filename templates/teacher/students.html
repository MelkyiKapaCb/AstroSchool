{% extends "base.html" %}

{% block content %}
<h2>👨‍🏫 Мои ученики</h2>

<form method="post" action="/teacher/add-student" style="margin-bottom: 30px;">
    <input type="text" name="name" placeholder="Имя ученика" required>
    <input type="number" name="coins" placeholder="Начальные монеты" value="0">
    <button type="submit">➕ Добавить ученика</button>
</form>

<h3>📋 Список учеников класса {{ teacher.class }}</h3>
<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Имя</th>
            <th>Монеты</th>
            <th>Действия</th>
        </tr>
    </thead>
    <tbody>
        {% for student in students %}
        <tr>
            <td>{{ student.id }}</td>
            <td>{{ student.name }}</td>
            <td>💰 {{ student.coins }}</td>
            <td>
                <a href="/teacher/balance/{{ student.id }}" class="btn">💰 Управление балансом</a>
                <a href="/cart?student_id={{ student.id }}" class="btn">🛒 Корзина</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
